# Render blueprint — native Node (no Docker)
# Dashboard: New → Blueprint → connect this repo, or create a Web Service manually.
services:
  - type: web
    name: faculty-lms-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: CORS_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: lesson-files
      - key: MAX_FILE_SIZE_BYTES
        value: "52428800"
      - key: SIGNED_URL_EXPIRES_SEC
        value: "3600"
