[build]
  base = "."
  command = "npm run build"
  publish = "dist"
  # Use this file with Netlify Base directory = frontend
  # (or set Base directory empty and point command/publish from the site UI)

[build.environment]
  NODE_VERSION = "20"

# SPA client-side routing: send all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
